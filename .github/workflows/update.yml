name: Actualizar Tasas VeTasa

on:
  schedule:
    # Se ejecuta cada hora en el minuto 0
    - cron: '0 * * * *'
  workflow_dispatch:
    # Permite ejecutarlo manualmente desde GitHub

permissions:
  contents: write

jobs:
  update-rates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar script de actualización
        run: python updater.py

      - name: Hacer commit y push de los cambios
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add tasas.json
          git commit -m "Actualización automática de tasas" || exit 0
          git push
